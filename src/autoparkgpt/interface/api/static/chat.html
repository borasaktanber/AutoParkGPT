<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoParkGPT</title>
  <style>
    :root {
      --bg: #0f1419; --panel: #1a2029; --line: #2a323d;
      --user: #2563eb; --bot: #232b36; --text: #e6edf3; --muted: #8b97a5;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    header {
      padding: 14px 20px; border-bottom: 1px solid var(--line);
      display: flex; align-items: baseline; gap: 10px;
    }
    header h1 { font-size: 17px; margin: 0; }
    header span { color: var(--muted); font-size: 13px; }
    #log {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      max-width: 820px; width: 100%; margin: 0 auto;
    }
    .row { display: flex; }
    .row.user { justify-content: flex-end; }
    .bubble {
      max-width: 76%; padding: 10px 14px; border-radius: 14px;
      line-height: 1.45; white-space: pre-wrap; word-wrap: break-word;
    }
    .user .bubble { background: var(--user); border-bottom-right-radius: 4px; }
    .bot .bubble { background: var(--bot); border-bottom-left-radius: 4px; }
    .meta { margin-top: 6px; font-size: 12px; color: var(--muted); }
    .tag {
      display: inline-block; padding: 1px 7px; border-radius: 999px;
      border: 1px solid var(--line); margin-right: 6px;
    }
    .tag.blocked { color: #fca5a5; border-color: #7f1d1d; }
    .tag.reserved { color: #86efac; border-color: #14532d; }
    footer {
      border-top: 1px solid var(--line); padding: 14px 20px;
      display: flex; gap: 10px; max-width: 820px; width: 100%; margin: 0 auto;
    }
    #msg {
      flex: 1; padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--panel); color: var(--text);
      font-size: 15px; outline: none;
    }
    #msg:focus { border-color: var(--accent); }
    button {
      padding: 11px 20px; border: 0; border-radius: 10px; cursor: pointer;
      background: var(--accent); color: #07212e; font-weight: 600; font-size: 15px;
    }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>AutoParkGPT</h1>
    <span>parking info &amp; reservations</span>
  </header>
  <div id="log"></div>
  <footer>
    <input id="msg" placeholder="Ask about hours, prices, location — or book a space…" autofocus />
    <button id="send">Send</button>
  </footer>

  <script>
    const sessionId = "ui-" + Math.random().toString(36).slice(2, 10);
    const log = document.getElementById("log");
    const input = document.getElementById("msg");
    const sendBtn = document.getElementById("send");

    function addBubble(role, text, meta) {
      const row = document.createElement("div");
      row.className = "row " + role;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      if (meta) {
        const m = document.createElement("div");
        m.className = "meta";
        m.innerHTML = meta;
        bubble.appendChild(m);
      }
      row.appendChild(bubble);
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
      return bubble;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      addBubble("user", text);
      sendBtn.disabled = true;
      const thinking = addBubble("bot", "…");
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        });
        const data = await res.json();
        thinking.textContent = data.message || "(no response)";
        const tags = [];
        if (data.blocked) tags.push('<span class="tag blocked">blocked</span>');
        if (data.intent) tags.push('<span class="tag">' + data.intent + "</span>");
        if (data.sources && data.sources.length)
          tags.push("sources: " + data.sources.join(", "));
        if (data.reservation_id)
          tags.push('<span class="tag reserved">reserved ' + data.reservation_id.slice(0, 8) + "</span>");
        if (tags.length) {
          const m = document.createElement("div");
          m.className = "meta";
          m.innerHTML = tags.join(" ");
          thinking.appendChild(m);
        }
      } catch (e) {
        thinking.textContent = "Error contacting the server.";
      } finally {
        sendBtn.disabled = false;
        input.focus();
        log.scrollTop = log.scrollHeight;
      }
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
    addBubble("bot", "Hi! I can help with parking hours, prices, availability, location, or booking a space. What do you need?");
  </script>
</body>
</html>
