name: CI

on:
  push:
    branches: [main, "stage_**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Create virtual environment
        run: uv venv --python 3.12

      - name: Add venv to PATH
        run: echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv pip install ".[all,dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy (strict)
        run: mypy src eval

      - name: Pytest + coverage
        run: pytest --cov=autoparkgpt --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t autoparkgpt:ci .

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Trivy scans both dependency vulnerabilities and committed secrets.
      - name: Trivy filesystem scan (vulnerabilities + secrets)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "0" # report-only in CI skeleton; tighten before production
